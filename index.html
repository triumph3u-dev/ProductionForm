<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Production Form v3</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#0F4C81;--pl:#1565C0;--pd:#0A3560;
  --s:#2E7D32;--sl:#E8F5E9;--sb:#A5D6A7;
  --w:#E65100;--wl:#FFF3E0;
  --d:#B71C1C;--dl:#FFEBEE;
  --ac:#00ACC1;--al:#E0F7FA;
  --bg:#F4F7FB;--sf:#fff;
  --bdr:#D0D9E8;--muted:#607D8B;--hint:#90A4AE;--text:#1A2633;
  --r:8px;--rl:12px;
  --sh:0 1px 4px rgba(15,76,129,.08);
  --sh2:0 4px 20px rgba(15,76,129,.13);
}
html{scroll-behavior:smooth}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* Topbar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;
  background:linear-gradient(135deg,var(--pd),var(--p) 60%,var(--pl));
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:var(--sh2)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:17px}
.tb-title{color:#fff;font-size:15px;font-weight:700}
.tb-sub{color:rgba(255,255,255,.6);font-size:10px}
.tb-right{display:flex;align-items:center;gap:8px}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 11px;color:rgba(255,255,255,.9);font-size:11px;font-family:'JetBrains Mono',monospace}
.badge.sv{background:rgba(46,125,50,.4);border-color:rgba(46,125,50,.6)}
.badge.lk{background:rgba(183,28,28,.4);border-color:rgba(183,28,28,.6)}
.clk{color:rgba(255,255,255,.7);font-size:11px;font-family:'JetBrains Mono',monospace}

/* Layout */
.layout{display:flex;padding-top:52px;min-height:100vh}
.sidebar{width:200px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bdr);
  position:fixed;top:52px;bottom:0;left:0;overflow-y:auto;padding:16px 0}
.sb-sec{padding:0 14px 6px;font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.7px}
.ph-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;
  border-left:3px solid transparent;transition:.15s;font-size:13px;color:var(--muted)}
.ph-item:hover{background:#F0F4F8;color:var(--text)}
.ph-item.active{background:#EEF4FB;border-left-color:var(--p);color:var(--p);font-weight:600}
.ph-item.done{color:var(--s)}
.ph-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--bg);color:var(--muted);transition:.15s;flex-shrink:0}
.ph-item.done .ph-dot{background:var(--s);border-color:var(--s);color:#fff}
.ph-item.active .ph-dot{background:var(--p);border-color:var(--p);color:#fff}
.ph-lbl{flex:1}.ph-sub{font-size:10px;color:var(--hint);font-weight:400;display:block}
.sb-div{border:none;border-top:1px solid var(--bdr);margin:10px 14px}
.qs{padding:7px 14px}
.qs-lbl{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.qs-val{font-size:17px;font-weight:700;font-family:'JetBrains Mono',monospace}
.qs-val.ok{color:var(--s)}.qs-val.warn{color:var(--w)}.qs-val.err{color:var(--d)}.qs-val.bl{color:var(--p)}

/* Main */
.main{margin-left:200px;padding:20px 24px 100px;flex:1}
.prog-bar{height:3px;background:var(--al);border-radius:3px;margin-bottom:18px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--p));border-radius:3px;transition:.4s}

/* Card */
.card{background:var(--sf);border:1px solid var(--bdr);border-radius:var(--rl);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh)}
.card-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--p);margin-bottom:14px;padding-bottom:9px;border-bottom:2px solid var(--al)}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.g3c{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.span2{grid-column:span 2}.span3{grid-column:span 3}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}

/* Field */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.req{color:var(--d);margin-left:2px}
.field input,.field select,.field textarea{border:1.5px solid var(--bdr);border-radius:var(--r);padding:8px 11px;font-family:'Sarabun',sans-serif;font-size:13px;color:var(--text);background:var(--sf);transition:.15s;outline:none;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(15,76,129,.10)}
.field input[readonly]{background:#F8FAFC;color:var(--muted)}
.field textarea{resize:vertical;min-height:90px;line-height:1.6}
.hint{font-size:11px;color:var(--hint)}
.vmsg{font-size:11px;font-weight:600}
.vmsg.ok{color:var(--s)}.vmsg.warn{color:var(--w)}.vmsg.err{color:var(--d)}

/* Alert */
.alert{display:flex;gap:8px;align-items:flex-start;padding:9px 13px;border-radius:var(--r);font-size:12px;border-left:3px solid}
.al-info{background:var(--al);border-color:var(--ac);color:#006064}
.al-warn{background:var(--wl);border-color:var(--w);color:#BF360C}
.al-err{background:var(--dl);border-color:var(--d);color:#B71C1C}
.al-ok{background:var(--sl);border-color:var(--s);color:#1B5E20}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:var(--r);border:1.5px solid var(--bdr);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;background:var(--sf);color:var(--text);transition:.15s}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}.btn-p:hover{background:var(--pd)}
.btn-s{background:var(--s);color:#fff;border-color:var(--s)}.btn-s:hover{background:#1B5E20}
.btn-d{background:var(--d);color:#fff;border-color:var(--d)}
.btn-w{background:var(--w);color:#fff;border-color:var(--w)}
.btn-out{background:transparent;color:var(--p);border-color:var(--p)}.btn-out:hover{background:var(--al)}
.btn-sm{padding:5px 11px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}

/* Radio */
.rgrp{display:flex;gap:6px;flex-wrap:wrap}
.ropt{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--bdr);cursor:pointer;font-size:12px;user-select:none;transition:.12s;font-weight:500}
.ropt:hover{border-color:var(--p);background:var(--al)}
.rp{border-color:var(--s);background:var(--sl);color:var(--s)}
.rf{border-color:var(--d);background:var(--dl);color:var(--d)}
.rn{border-color:var(--muted);background:#ECEFF1;color:var(--muted)}

/* Tables */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--p);color:#fff;padding:7px 11px;font-size:11px;font-weight:600;text-align:left}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--bdr);font-size:12px;vertical-align:middle}
.tbl tr:nth-child(even) td{background:#F8FAFC}

/* Weight log table */
.wlog{width:100%;border-collapse:collapse;margin-top:8px}
.wlog th{background:var(--p);color:#fff;padding:6px 8px;font-size:11px;text-align:center;font-weight:600}
.wlog td{border:1px solid var(--bdr);padding:4px 6px;text-align:center;font-size:12px}
.wlog td.tleft{text-align:left;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;background:#f8fafc}
.winp{width:72px;border:none;background:transparent;text-align:center;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;font-weight:600;padding:2px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
.kpi{background:var(--sf);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;text-align:center;box-shadow:var(--sh)}
.kpi-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.kpi-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.kpi.bl .kpi-val{color:var(--p)}.kpi.gn .kpi-val{color:var(--s)}.kpi.rd .kpi-val{color:var(--d)}.kpi.am .kpi-val{color:var(--w)}

/* Downtime */
.dt-box{background:#F8FAFC;border:1px solid var(--bdr);border-radius:var(--r);padding:11px;margin-bottom:8px}
.dt-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.dt-ttl{font-size:12px;font-weight:700;color:var(--p)}

/* Tag */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600}
.tag-b{background:#E3F2FD;color:#1565C0}.tag-g{background:var(--sl);color:var(--s)}
.tag-r{background:var(--dl);color:var(--d)}.tag-w{background:var(--wl);color:var(--w)}

/* Audit */
.audit-list{list-style:none}
.ai{display:flex;gap:9px;padding:5px 0;border-bottom:1px dashed var(--bdr);font-size:11px}
.ai:last-child{border-bottom:none}
.at{font-family:'JetBrains Mono',monospace;color:var(--ac);min-width:120px;flex-shrink:0}
.au{color:var(--p);font-weight:600;min-width:90px;flex-shrink:0}

/* Summary */
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--bdr);font-size:12px}
.sum-row:last-child{border-bottom:none}
.sum-row span:first-child{color:var(--muted)}
.sep{display:flex;align-items:center;gap:8px;margin:12px 0 8px;font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.7px}
.sep::before,.sep::after{content:'';flex:1;border-top:1px solid var(--bdr)}
hr.dvd{border:none;border-top:1px solid var(--bdr);margin:12px 0}

/* Lock */
.lock-notice{background:var(--sl);border:1px solid var(--sb);border-radius:var(--r);padding:9px 13px;font-size:12px;color:var(--s);font-weight:600;display:flex;align-items:center;gap:8px}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--sf);border-radius:var(--rl);padding:24px;min-width:300px;max-width:400px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--p)}
.pin-row{display:flex;gap:6px;justify-content:center;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bdr);background:transparent;transition:.2s}
.pin-dot.filled{background:var(--p);border-color:var(--p)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pin-btn{padding:14px;border:1.5px solid var(--bdr);border-radius:var(--r);background:var(--sf);font-size:16px;font-weight:600;cursor:pointer;text-align:center;transition:.15s;font-family:'JetBrains Mono',monospace}
.pin-btn:hover{background:var(--bg);border-color:var(--p)}
.pin-btn.clear{color:var(--d);border-color:var(--dl)}
.pin-btn.ok{background:var(--p);color:#fff;border-color:var(--p)}

/* History panel */
.hist-panel{background:var(--sf);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px}
.hist-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px;align-items:center;cursor:pointer}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:#F0F4F8;margin:0 -4px;padding:7px 4px;border-radius:4px}
.hist-doc{font-family:'JetBrains Mono',monospace;color:var(--p);min-width:130px}
.hist-status{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.hs-draft{background:var(--wl);color:var(--w)}.hs-locked{background:var(--sl);color:var(--s)}

/* Footer */
.footer{position:fixed;bottom:0;left:200px;right:0;z-index:100;background:var(--sf);border-top:1px solid var(--bdr);padding:9px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.footer-info{font-size:11px;color:var(--muted);display:flex;gap:12px;align-items:center}
.footer-btns{display:flex;gap:7px}

/* Toast */
.toast{position:fixed;bottom:75px;right:20px;z-index:600;background:var(--text);color:#fff;border-radius:var(--r);padding:9px 16px;font-size:12px;font-weight:500;box-shadow:var(--sh2);display:flex;align-items:center;gap:8px;animation:sIn .25s ease,fOut .3s ease 2.7s forwards}
@keyframes sIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fOut{from{opacity:1}to{opacity:0}}

/* Spinner */
.spin-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:400;align-items:center;justify-content:center}
.spin-overlay.open{display:flex}
.spinner{width:36px;height:36px;border:4px solid var(--bdr);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:14px 12px 100px}.footer{left:0}.kpi-row{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
</style>
</head>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwTez5-PGgkpth1DivHUA0ZBQOOA3OddZzoGmyVHfxzMT1cqwLvxSaBzC28OvH67qSBKg/exec"; // ← ใส่ URL ของ Apps Script Web App
</script>

<!-- Topbar -->
<header class="topbar">
  <div class="tb-left">
    <div class="tb-logo">🏭</div>
    <div><div class="tb-title">Production Form</div><div class="tb-sub">Sachet SM9–12 | Hygiene FMCG</div></div>
  </div>
  <div class="tb-right">
    <span class="clk" id="clk"></span>
    <span class="badge" id="bdoc"></span>
    <span class="badge sv" id="bsv" style="display:none"></span>
    <span class="badge lk" id="blk" style="display:none">🔒 LOCKED</span>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.25);font-size:11px" onclick="openHistory()">📋 ประวัติ</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.25);font-size:11px" onclick="openSvModal('login')">🔐 Supervisor</button>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sb-sec">ขั้นตอน</div>
  <div class="ph-item" id="nav0" onclick="go(0)"><div class="ph-dot" id="dot0">1</div><div class="ph-lbl">ก่อนผลิต<span class="ph-sub">Pre-production</span></div></div>
  <div class="ph-item" id="nav1" onclick="go(1)"><div class="ph-dot" id="dot1">2</div><div class="ph-lbl">ระหว่างผลิต<span class="ph-sub">During</span></div></div>
  <div class="ph-item" id="nav2" onclick="go(2)"><div class="ph-dot" id="dot2">3</div><div class="ph-lbl">หลังสิ้นกะ<span class="ph-sub">Post-shift</span></div></div>
  <div class="ph-item" id="nav3" onclick="go(3)"><div class="ph-dot" id="dot3">4</div><div class="ph-lbl">สรุปรายงาน<span class="ph-sub">Summary</span></div></div>
  <hr class="sb-div"/>
  <div class="sb-sec">ตัวชี้วัด</div>
  <div class="qs"><div class="qs-lbl">Reject Rate</div><div class="qs-val bl" id="qs-rj">—</div></div>
  <div class="qs"><div class="qs-lbl">% Yield</div><div class="qs-val bl" id="qs-yd">—</div></div>
  <div class="qs"><div class="qs-lbl">Downtime</div><div class="qs-val ok" id="qs-dt">0 นาที</div></div>
  <div class="qs"><div class="qs-lbl">Bulk คงเหลือ</div><div class="qs-val bl" id="qs-bl">—</div></div>
</nav>

<main class="main">
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:25%"></div></div>
  <div id="content"></div>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-info">
    <span id="ft-doc"></span>
    <span id="ft-ph"></span>
    <span id="ft-conn" style="color:var(--hint)">⟳ กำลังเชื่อมต่อ...</span>
  </div>
  <div class="footer-btns">
    <button class="btn btn-sm" id="btn-save" onclick="autoSave()" style="display:none">💾 บันทึก</button>
    <button class="btn btn-sm" id="btn-bk" onclick="prev()" style="display:none">← ย้อนกลับ</button>
    <button class="btn btn-p btn-sm" id="btn-nx" onclick="next()">ถัดไป →</button>
  </div>
</footer>

<!-- Supervisor Modal -->
<div class="modal-bg" id="sv-modal">
  <div class="modal">
    <h3 id="sv-modal-title">🔐 Supervisor Login</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:8px" id="sv-modal-desc">กรอก PIN 4 หลัก</p>
    <div class="pin-row" id="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div id="pin-err" style="text-align:center;color:var(--d);font-size:12px;min-height:18px"></div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinInput('1')">1</button>
      <button class="pin-btn" onclick="pinInput('2')">2</button>
      <button class="pin-btn" onclick="pinInput('3')">3</button>
      <button class="pin-btn" onclick="pinInput('4')">4</button>
      <button class="pin-btn" onclick="pinInput('5')">5</button>
      <button class="pin-btn" onclick="pinInput('6')">6</button>
      <button class="pin-btn" onclick="pinInput('7')">7</button>

      <button class="pin-btn" onclick="pinInput('9')">9</button>
      <button class="pin-btn clear" onclick="pinClear()">⌫</button>
      <button class="pin-btn" onclick="pinInput('0')">0</button>
      <button class="pin-btn clear" onclick="closeSvModal()">✕</button>
    </div>
  </div>
</div>

<!-- History Modal -->
<div class="modal-bg" id="hist-modal">
  <div class="modal" style="min-width:560px;max-width:700px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>📋 ประวัติการบันทึก</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-s btn-sm" onclick="exportExcel()">📥 Export Excel</button>
        <button class="btn btn-sm" onclick="closeHistory()">✕ ปิด</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input type="date" id="hist-from" style="border:1px solid var(--bdr);border-radius:var(--r);padding:5px 9px;font-size:12px"/>
      <input type="date" id="hist-to" style="border:1px solid var(--bdr);border-radius:var(--r);padding:5px 9px;font-size:12px"/>
      <button class="btn btn-p btn-sm" onclick="loadHistory()">🔍 ค้นหา</button>
    </div>
    <div id="hist-content" style="max-height:400px;overflow-y:auto"></div>
  </div>
</div>

<!-- Spinner -->
<div class="spin-overlay" id="spinner"><div class="spinner"></div></div>

<script>
// ──────────────────────────────────────────────────────────────
// Constants
// ──────────────────────────────────────────────────────────────
const LINES = ["Sachet SM9-12"];
const DT_TYPES = ["เครื่องจักร","วัตถุดิบ/ฟิล์ม","คน","Changeover/CIP","PM","อื่นๆ"];
const DT_SUB = {

// ──────────────────────────────────────────────────────────────
// Computed
// ──────────────────────────────────────────────────────────────
function wMin(){return parseFloat(S.weightSpec.split("-")[0])||237.6;}
function wMax(){return parseFloat(S.weightSpec.split("-")[1])||240;}
function allW(){return S.weightLog.flatMap(r=>r.vals.map(Number).filter(v=>v>0));}
function avgW(){const w=allW();return w.length?(w.reduce((a,b)=>a+b,0)/w.length).toFixed(2):"0";}
function inSpec(){const w=allW();if(!w.length)return null;return Math.round(w.filter(v=>v>=wMin()&&v<=wMax()).length/w.length*100);}
function pT(t){if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;}
function dMin(a,b){if(!a||!b)return null;const d=pT(b)-pT(a);return d>0?d:null;}
function totalDT(){return S.dts.reduce((s,d)=>s+(dMin(d.start,d.end)||0),0);}
function plannedDT(){return S.dts.filter(d=>d.planned==="planned").reduce((s,d)=>s+(dMin(d.start,d.end)||0),0);}
function rjRate(){const r=parseFloat(S.reject),p=parseFloat(S.produced);if(!r||!p)return null;return(r/(p*12+r)*100).toFixed(2);}
function bulkUsedCalc(){
  const avg=parseFloat(avgW()),p=parseFloat(S.produced);
  if(!avg||!p)return 0;
  return (avg/1000*p*12).toFixed(2);
}
function bulkLeft(){
  const recv=parseFloat(S.bulkReceived)||0;
  const used=parseFloat(bulkUsedCalc())||0;
  return(recv-used).toFixed(2);
}
function yld(){
  const recv=parseFloat(S.bulkReceived);
  const used=parseFloat(bulkUsedCalc());
  if(!recv||!used)return null;
  return(used/recv*100).toFixed(2);
}

function updatePinDots(){
  for(let i=0;i<4;i++) document.getElementById("pd"+i).classList.toggle("filled",i<pinBuffer.length);

  showSpinner();

    S.isSupervisor=true; S.svPinVerified=true;
    document.getElementById("bsv").textContent="🔐 Supervisor";
    document.getElementById("bsv").style.display="";

function mkDateField(){
  const f=document.createElement("div");f.className="field";
  const l=document.createElement("label");l.innerHTML="วันที่ผลิต <span class='req'>*</span> <span style='font-weight:400;text-transform:none;color:var(--hint)'>(DD/MM/YY)</span>";f.appendChild(l);

  const picker=document.createElement("input");picker.type="date";
  picker.style.cssText="border:1.5px solid var(--bdr);border-radius:var(--r);padding:8px 11px;font-size:13px;width:100%;outline:none;cursor:pointer;background:var(--sf)";
  // Convert current DD/MM/YY to YYYY-MM-DD for picker
  try{
    const parts=S.date.split("/");
    if(parts.length===3){
      const yy=parseInt(parts[2])+2000;
      picker.value=`${yy}-${parts[1]}-${parts[0]}`;
    }
  }catch(e){}
  picker.addEventListener("change",()=>{
    const d=new Date(picker.value);
    const dd=String(d.getDate()).padStart(2,"0");
    const mm=String(d.getMonth()+1).padStart(2,"0");
    const yy=String(d.getFullYear()).slice(2);
    S.date=`${dd}/${mm}/${yy}`;
    display.value=S.date;
  });
  if(S.locked)picker.disabled=true;
  f.appendChild(picker);
  const display=document.createElement("input");display.type="text";display.value=S.date;
  display.style.cssText="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:12px;border:1px solid var(--bdr);border-radius:var(--r);padding:5px 9px;background:#f8fafc;color:var(--p)";
  display.readOnly=true;f.appendChild(display);
  return f;
}

    const g=grid("g2");
    const d1=document.createElement("div");d1.appendChild(sep("ข้อมูลการผลิต"));
    [["เลขที่เอกสาร",S.docNo],["วันที่",S.date],["ผลิตภัณฑ์",S.product||"—"],["Operator",S.operator||"—"],["Film Supplier",S.filmSupplier],["Film Lot",S.filmLot||"—"],["Bulk Batch",S.batchBulk||"—"],["Changeover",(dMin(S.shiftStart,S.coEnd)||"—")+" นาที"]].forEach(([k,v])=>{const r=document.createElement("div");r.className="sum-row";r.innerHTML=`<span>${k}</span><strong>${v}</strong>`;d1.appendChild(r);});g.appendChild(d1);
    const d2=document.createElement("div");d2.appendChild(sep("ผลการผลิต"));
    [["ยอดผลิต (DZ)",S.produced||"—"],["ซองเปล่า Reject (EA)",S.reject||"0"],["ซองตัด (EA)",S.trimmed||"0"],["Reject Rate",rr?rr+"%":"—"],["% Yield",yp?yp+"%":"—"],["Bulk รับ (kg)",S.bulkReceived||"—"],["Bulk ใช้จริง (kg)",bulkUsedCalc()],["Bulk คงเหลือ (kg)",bulkLeft()],["Downtime",`${tdm} นาที (P:${pm}/U:${upm})`],["น้ำหนัก AVG",`${avgW()} g (In Spec: ${inSpec()!==null?inSpec()+"%":"—"})`]].forEach(([k,v])=>{const r=document.createElement("div");r.className="sum-row";r.innerHTML=`<span>${k}</span><strong>${v}</strong>`;d2.appendChild(r);});g.appendChild(d2);c.appendChild(g);
    if(S.notes){c.appendChild(sep("เหตุการณ์พิเศษ"));const nd=document.createElement("pre");nd.style.cssText="background:#F8FAFC;border:1px solid var(--bdr);border-radius:var(--r);padding:11px;font-size:12px;white-space:pre-wrap;font-family:'Sarabun',sans-serif;line-height:1.6";nd.textContent=S.notes;c.appendChild(nd);}
    c.appendChild(hr());
    const brow=document.createElement("div");brow.style.cssText="display:flex;gap:8px";
    const pb=document.createElement("button");pb.className="btn btn-p btn-sm";pb.innerHTML="🖨️ พิมพ์";pb.onclick=()=>window.print();brow.appendChild(pb);
    const xb=document.createElement("button");xb.className="btn btn-s btn-sm";xb.innerHTML="📥 Export Excel";xb.onclick=()=>exportExcel();brow.appendChild(xb);
    c.appendChild(brow);
  }));

  frag.appendChild(card("📝 Audit Trail",c=>{
    const ul=document.createElement("ul");ul.className="audit-list";
    [...S.audit].reverse().forEach(a=>{const li=document.createElement("li");li.className="ai";li.innerHTML=`<span class='at'>🕐 ${a.t}</span><span class='au'>👤 ${a.u}</span><span>${a.a}</span>`;ul.appendChild(li);});
    c.appendChild(ul);
    if(S.locked){const lb=document.createElement("div");lb.className="lock-notice";lb.style.marginTop="10px";lb.innerHTML="🔒 เอกสารล็อคแล้ว — ต้องใช้ PIN Supervisor เพื่อแก้ไข";c.appendChild(lb);}
  }));
  return frag;
}

// ──────────────────────────────────────────────────────────────
// Render & Navigation
// ──────────────────────────────────────────────────────────────
const PH=["ก่อนผลิต","ระหว่างผลิต","หลังสิ้นกะ","สรุปรายงาน"];
function render(){
  const ct=$id("content");ct.innerHTML="";
  const frag=S.phase===0?p0():S.phase===1?p1():S.phase===2?p2():p3();
  ct.appendChild(frag);
  updateSB();updateFoot();
}
function updateSB(){
  ["nav0","nav1","nav2","nav3"].forEach((id,i)=>{$id(id).className="ph-item"+(S.phase===i?" active":i<S.phase?" done":"");});
  ["dot0","dot1","dot2","dot3"].forEach((id,i)=>{$id(id).textContent=i<S.phase?"✓":i+1;});
  $id("bdoc").textContent="📄 "+S.docNo;
  $id("blk").style.display=S.locked?"":"none";
  $id("prog").style.width=((S.phase+1)/4*100)+"%";
  const rr=rjRate(),yp=yld(),isp=inSpec(),tdm=totalDT();
  const qrj=$id("qs-rj");qrj.textContent=rr?rr+"%":"—";qrj.className="qs-val "+(rr?(parseFloat(rr)>2?"err":parseFloat(rr)>1?"warn":"ok"):"bl");
  const qyd=$id("qs-yd");qyd.textContent=yp?yp+"%":"—";qyd.className="qs-val "+(yp?(parseFloat(yp)>=95?"ok":"err"):"bl");
  $id("qs-dt").textContent=totalDT()+" นาที";
  const ql=$id("qs-bl");ql.textContent=S.bulkReceived?bulkLeft()+" kg":"—";ql.className="qs-val "+(parseFloat(bulkLeft())<0?"err":"ok");
}
function updateFoot(){
  $id("ft-doc").innerHTML=`<strong style='color:var(--p)'>📄 ${S.docNo}</strong>`;
  $id("ft-ph").textContent="ขั้นตอน: "+PH[S.phase];
  $id("btn-bk").style.display=S.phase>0&&!S.locked?"":"none";
  $id("btn-save").style.display=S.phase>0?"":"none";
  const nx=$id("btn-nx");
  if(S.phase===3){nx.style.display="none";}
  else{nx.style.display="";nx.textContent=S.phase===2?"ดูสรุปรายงาน →":"ถัดไป →";}
}
function go(p){if(S.locked&&p>S.phase)return;S.phase=p;render();window.scrollTo({top:0,behavior:"smooth"});}
function next(){if(S.phase<3){S.audit.push({t:nowTs(),u:S.operator||"system",a:"ผ่านขั้นตอน "+(S.phase+2)});S.phase++;render();window.scrollTo({top:0,behavior:"smooth"});}}
function prev(){if(S.phase>0){S.phase--;render();window.scrollTo({top:0,behavior:"smooth"});}}

// Clock
setInterval(()=>$id("clk").textContent=new Date().toLocaleTimeString("th-TH",{hour12:false}),1000);

// Init
(async()=>{render();await loadProducts();render();})();
</script>
</body>
</html>
