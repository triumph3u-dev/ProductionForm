<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Production Form — บันทึกการผลิต</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#0F4C81;--pl:#1565C0;--pd:#0A3560;
  --accent:#00ACC1;--al:#E0F7FA;
  --s:#2E7D32;--sl:#E8F5E9;
  --w:#E65100;--wl:#FFF3E0;
  --d:#B71C1C;--dl:#FFEBEE;
  --n:#546E7A;--nl:#ECEFF1;
  --bg:#F4F7FB;--surface:#FFFFFF;
  --border:#D0D9E8;--border2:#B0BEC5;
  --text:#1A2633;--muted:#607D8B;--hint:#90A4AE;
  --r:8px;--rl:12px;
  --sh:0 1px 4px rgba(15,76,129,.08);
  --sh2:0 4px 20px rgba(15,76,129,.12);
  --sh3:0 8px 32px rgba(15,76,129,.16);
}
html{scroll-behavior:smooth}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:linear-gradient(135deg,var(--pd) 0%,var(--p) 60%,var(--pl) 100%);
  box-shadow:var(--sh3);display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:56px;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-box{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar h1{color:#fff;font-size:16px;font-weight:700;letter-spacing:.3px}
.topbar-sub{color:rgba(255,255,255,.6);font-size:11px}
.topbar-right{display:flex;align-items:center;gap:8px}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;color:rgba(255,255,255,.9);font-size:11px;font-family:'JetBrains Mono',monospace}
.badge.locked{background:rgba(46,125,50,.4);border-color:rgba(46,125,50,.6)}
.clock{color:rgba(255,255,255,.7);font-size:11px;font-family:'JetBrains Mono',monospace}

.layout{display:flex;padding-top:56px;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:56px;bottom:0;left:0;overflow-y:auto;padding:20px 0}
.sb-section{padding:0 16px 6px;font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.8px}
.ph-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:.15s;font-size:13px;color:var(--muted)}
.ph-item:hover{background:#F0F4F8;color:var(--text)}
.ph-item.active{background:#EEF4FB;border-left-color:var(--p);color:var(--p);font-weight:600}
.ph-item.done{color:var(--s)}
.ph-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--bg);color:var(--muted);transition:.15s;flex-shrink:0}
.ph-item.done .ph-dot{background:var(--s);border-color:var(--s);color:#fff}
.ph-item.active .ph-dot{background:var(--p);border-color:var(--p);color:#fff}
.ph-lbl{flex:1}.ph-sub{font-size:10px;color:var(--hint);font-weight:400;display:block}
.sb-div{border:none;border-top:1px solid var(--border);margin:12px 16px}
.qs{padding:8px 16px}
.qs-label{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.qs-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
.qs-val.ok{color:var(--s)}.qs-val.warn{color:var(--w)}.qs-val.err{color:var(--d)}.qs-val.blue{color:var(--p)}

.main{margin-left:220px;padding:24px 28px 100px;flex:1}
.prog-bar{height:3px;background:var(--al);border-radius:3px;margin-bottom:20px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--p));border-radius:3px;transition:.4s ease}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px 22px;margin-bottom:14px;box-shadow:var(--sh)}
.card-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--p);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--al)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.span2{grid-column:span 2}

.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.req{color:var(--d);margin-left:2px}
.field input,.field select,.field textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:9px 12px;font-family:'Sarabun',sans-serif;font-size:13px;color:var(--text);background:var(--surface);transition:.15s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(15,76,129,.10)}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.hint{font-size:11px;color:var(--hint)}
.vmsg{font-size:11px;font-weight:600}
.vmsg.ok{color:var(--s)}.vmsg.warn{color:var(--w)}.vmsg.err{color:var(--d)}

.alert{display:flex;gap:8px;align-items:flex-start;padding:10px 14px;border-radius:var(--r);font-size:12px;border-left:3px solid}
.al-info{background:var(--al);border-color:var(--accent);color:#006064}
.al-warn{background:var(--wl);border-color:var(--w);color:#BF360C}
.al-err{background:var(--dl);border-color:var(--d);color:#B71C1C}
.al-ok{background:var(--sl);border-color:var(--s);color:#1B5E20}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:var(--r);border:1.5px solid var(--border);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;background:var(--surface);color:var(--text);transition:.15s}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}.btn-p:hover{background:var(--pd);box-shadow:0 4px 12px rgba(15,76,129,.3)}
.btn-s{background:var(--s);color:#fff;border-color:var(--s)}.btn-s:hover{background:#1B5E20}
.btn-d{background:var(--d);color:#fff;border-color:var(--d)}
.btn-out{background:transparent;color:var(--p);border-color:var(--p)}.btn-out:hover{background:var(--al)}
.btn-sm{padding:5px 12px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}

.rgrp{display:flex;gap:6px;flex-wrap:wrap}
.ropt{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;font-size:12px;user-select:none;transition:.12s;font-weight:500}
.ropt:hover{border-color:var(--p);background:var(--al)}
.rp{border-color:var(--s);background:var(--sl);color:var(--s)}
.rf{border-color:var(--d);background:var(--dl);color:var(--d)}
.rn{border-color:var(--n);background:var(--nl);color:var(--n)}

.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--p);color:#fff;padding:8px 12px;font-size:11px;font-weight:600;text-align:left}
.tbl th.tc{text-align:center}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.tbl tr:nth-child(even) td{background:#F8FAFC}
.tbl td.tc{text-align:center}

.wt-tbl{width:100%;border-collapse:collapse}
.wt-tbl th{background:var(--p);color:#fff;padding:7px 8px;font-size:11px;text-align:center;font-weight:600}
.wt-tbl th.tl{text-align:left;width:100px}
.wt-tbl td{border:1px solid var(--border);padding:4px;text-align:center}
.wt-tbl td.wl{text-align:left;padding:6px 10px;font-size:11px;color:var(--muted);font-weight:600;background:#F8FAFC}
.wt-inp{width:68px;border:none;background:transparent;text-align:center;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;padding:3px;font-weight:600}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center;box-shadow:var(--sh)}
.kpi-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.kpi-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.kpi.blue .kpi-val{color:var(--p)}.kpi.green .kpi-val{color:var(--s)}.kpi.red .kpi-val{color:var(--d)}.kpi.amber .kpi-val{color:var(--w)}

.dt-box{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.dt-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dt-ttl{font-size:12px;font-weight:700;color:var(--p)}

.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.tag-b{background:#E3F2FD;color:#1565C0}.tag-g{background:var(--sl);color:var(--s)}
.tag-r{background:var(--dl);color:var(--d)}.tag-w{background:var(--wl);color:var(--w)}

.audit-list{list-style:none}
.ai{display:flex;gap:10px;padding:6px 0;border-bottom:1px dashed var(--border);font-size:11px}
.ai:last-child{border-bottom:none}
.at{font-family:'JetBrains Mono',monospace;color:var(--accent);min-width:130px;flex-shrink:0}
.au{color:var(--p);font-weight:600;min-width:100px;flex-shrink:0}

.sep{display:flex;align-items:center;gap:8px;margin:14px 0 10px;font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.7px}
.sep::before,.sep::after{content:'';flex:1;border-top:1px solid var(--border)}
hr.dvd{border:none;border-top:1px solid var(--border);margin:14px 0}

.lock-notice{background:var(--sl);border:1px solid #A5D6A7;border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--s);font-weight:600;display:flex;align-items:center;gap:8px}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:12px}
.sum-row:last-child{border-bottom:none}
.sum-row span:first-child{color:var(--muted)}

.footer{position:fixed;bottom:0;left:220px;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);padding:10px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.footer-info{font-size:11px;color:var(--muted);display:flex;gap:14px;align-items:center}
.footer-btns{display:flex;gap:8px}

.toast{position:fixed;bottom:80px;right:24px;z-index:500;background:var(--text);color:#fff;border-radius:var(--r);padding:10px 18px;font-size:12px;font-weight:500;box-shadow:var(--sh3);display:flex;align-items:center;gap:8px;animation:sIn .25s ease,fOut .3s ease 2.7s forwards}
@keyframes sIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fOut{from{opacity:1}to{opacity:0;pointer-events:none}}

@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:16px 14px 100px}.footer{left:0}.kpi-row{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo-box">🏭</div>
    <div>
      <h1>Production Form</h1>
      <div class="topbar-sub">บันทึกข้อมูลการผลิต — Hygiene FMCG</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="clock" id="clock"></span>
    <span class="badge" id="bdoc"></span>
    <span class="badge" id="bline"></span>
    <span class="badge locked" id="block" style="display:none">🔒 LOCKED</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sb-section">ขั้นตอนการกรอก</div>
    <div class="ph-item" id="nav0" onclick="go(0)">
      <div class="ph-dot" id="dot0">1</div>
      <div class="ph-lbl">ก่อนผลิต<span class="ph-sub">Pre-production</span></div>
    </div>
    <div class="ph-item" id="nav1" onclick="go(1)">
      <div class="ph-dot" id="dot1">2</div>
      <div class="ph-lbl">ระหว่างผลิต<span class="ph-sub">During Production</span></div>
    </div>
    <div class="ph-item" id="nav2" onclick="go(2)">
      <div class="ph-dot" id="dot2">3</div>
      <div class="ph-lbl">หลังสิ้นกะ<span class="ph-sub">Post-shift</span></div>
    </div>
    <div class="ph-item" id="nav3" onclick="go(3)">
      <div class="ph-dot" id="dot3">4</div>
      <div class="ph-lbl">สรุปรายงาน<span class="ph-sub">Summary</span></div>
    </div>
    <hr class="sb-div"/>
    <div class="sb-section">ตัวชี้วัดด่วน</div>
    <div class="qs"><div class="qs-label">Reject Rate</div><div class="qs-val blue" id="qs-rj">—</div></div>
    <div class="qs"><div class="qs-label">% Yield</div><div class="qs-val blue" id="qs-yd">—</div></div>
    <div class="qs"><div class="qs-label">Downtime รวม</div><div class="qs-val ok" id="qs-dt">0 นาที</div></div>
    <div class="qs"><div class="qs-label">% In Spec</div><div class="qs-val blue" id="qs-sp">—</div></div>
  </nav>

  <main class="main">
    <div class="prog-bar"><div class="prog-fill" id="prog" style="width:25%"></div></div>
    <div id="content"></div>
  </main>
</div>

<footer class="footer">
  <div class="footer-info">
    <span id="ft-doc"></span>
    <span id="ft-ph"></span>
    <span id="ft-warn" style="color:var(--d);display:none"></span>
  </div>
  <div class="footer-btns">
    <button class="btn btn-sm" id="btn-bk" onclick="prev()" style="display:none">← ย้อนกลับ</button>
    <button class="btn btn-p btn-sm" id="btn-nx" onclick="next()">บันทึกและถัดไป →</button>
  </div>
</footer>

<script>
const LINES=["Sachet_SM10","Sachet_SM9","Sachet_SM11","Sachet_SM12","Linapack","Volpak","Mespack3","Mespack"];
const SUPS=["Huhtamaki (HTMK)","Mondi","Star Flex (SF)","อื่นๆ"];
const DT_TYPES=["เครื่องจักร","วัตถุดิบ/ฟิล์ม","คน","Changeover/CIP","PM (ตามแผน)","อื่นๆ"];
const DT_SUB={"เครื่องจักร":["สายพาน","ซีลซอง","ใบมีด/รอยปรุ","Sensor","Pump","ติดขัด","อื่นๆ"],"วัตถุดิบ/ฟิล์ม":["ฟิล์มรอยต่อ","ฟิล์มยับ","น้ำยาหนัก/เบา","Film lot ใหม่","อื่นๆ"],"คน":["รอ Operator","เปลี่ยนกะ","อบรม","อื่นๆ"],"Changeover/CIP":["Changeover","CIP","ล้างเครื่อง","อื่นๆ"],"PM (ตามแผน)":["PM ตามกำหนด","PM ฉุกเฉิน","อื่นๆ"],"อื่นๆ":["ระบุในหมายเหตุ"]};
const PREP=[{id:"coolant",l:"การไล่น้ำค้างระบบ"},{id:"tank",l:"สภาพถังน้ำยา / วาล์วลม / ถังผสม"},{id:"conveyor",l:"สายพานสำเนียงผลิตภัณฑ์"},{id:"sealer",l:"เครื่องซีลซอง"},{id:"seal_temp",l:"อุณหภูมิซีล (Spec: 160–170 °C)",p:true,u:"°C"},{id:"seal_pres",l:"ความดันซีล (Spec: 4–6 bar)",p:true,u:"bar"},{id:"film",l:"ซอง / ม้วนฟิล์ม"},{id:"pe",l:"PE / ถุงแพ็ค PP"},{id:"sticker",l:"Sticker"},{id:"carton",l:"กล่อง Carton"}];
const QC=[{id:"ba",l:"ซอง — ลักษณะปรากฏ สีรูปแบบ"},{id:"bs",l:"ซอง — คุณภาพการซีล"},{id:"sl",l:"ซอง — รอยซีล"},{id:"cp",l:"ซอง — Compression test"},{id:"lb",l:"ซอง — รุ่นการผลิต Lot/Batch No."},{id:"pa",l:"การแพ็ค — ลักษณะปรากฏกล่อง"},{id:"pp",l:"การแพ็ค — คุณภาพการพิมพ์"},{id:"sk",l:"การแปะ Sticker"},{id:"lc",l:"กล่อง — Lot/Batch No."},{id:"pt",l:"กล่อง — การจัดเรียงบน Pallet"}];
const PH_NAMES=["ก่อนผลิต","ระหว่างผลิต","หลังสิ้นกะ","สรุปรายงาน"];

function genId(){return"PD"+new Date().getFullYear().toString().slice(2)+Math.random().toString(36).slice(2,7).toUpperCase();}
function nowStr(){return new Date().toLocaleString("th-TH",{hour12:false,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});}
function today(){return new Date().toISOString().slice(0,10);}

const S={
  phase:0,doc:genId(),locked:false,
  line:"Sachet_SM10",product:"",productPrev:"",date:today(),wSpec:"237.6 - 240",
  rateStd:"6400",bl:"AJ-1200E",shiftStart:"",coEnd:"",operator:"",
  fSup:"Huhtamaki (HTMK)",fLot:"",fRolls:"",bBatch:"",bVol:"",
  chk:{},
  dts:[{id:1,type:"",sub:"",start:"",end:"",planned:"unplanned",note:""}],
  wts:[{pt:"เริ่มผลิต",v:["","","","","",""]},{pt:"กลางกะ",v:["","","","","",""]},{pt:"สิ้นกะ",v:["","","","","",""]}],
  reject:"",trim:"",produced:"",qc:{},qcN:{},
  bUsed:"",bLeft:"",
  probType:"",probDetail:"",action:"",actBy:"",actTime:"",notes:"",
  svName:"",svTime:"",
  audit:[{t:nowStr(),u:"system",a:"สร้างเอกสารใหม่"}]
};

function wMin(){return parseFloat(S.wSpec.split("-")[0])||237.6;}
function wMax(){return parseFloat(S.wSpec.split("-")[1])||240;}
function allW(){return S.wts.flatMap(r=>r.v.map(Number).filter(v=>v>0));}
function avgW(){const w=allW();return w.length?(w.reduce((a,b)=>a+b,0)/w.length).toFixed(2):"—";}
function inSpec(){const w=allW();if(!w.length)return null;return Math.round(w.filter(v=>v>=wMin()&&v<=wMax()).length/w.length*100);}
function pT(t){if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;}
function dMin(a,b){if(!a||!b)return null;const d=pT(b)-pT(a);return d>0?d:null;}
function totalDT(){return S.dts.reduce((s,d)=>s+(dMin(d.start,d.end)||0),0);}
function plannedDT(){return S.dts.filter(d=>d.planned==="planned").reduce((s,d)=>s+(dMin(d.start,d.end)||0),0);}
function rjRate(){const r=parseFloat(S.reject),p=parseFloat(S.produced);if(!r||!p)return null;return(r/(p*12+r)*100).toFixed(2);}
function yld(){const b=parseFloat(S.bUsed),p=parseFloat(S.produced);if(!b||!p)return null;return((p*12*wMin()/1000)/b*100).toFixed(2);}

function log(a){S.audit.push({t:nowStr(),u:S.operator||"system",a});}
function toast(msg,ic="✅"){const t=document.createElement("div");t.className="toast";t.innerHTML=ic+" "+msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function $id(id){return document.getElementById(id);}

function mkI(v,ph,cb,type,dis){const e=document.createElement("input");e.type=type||"text";e.value=v||"";if(ph)e.placeholder=ph;if(dis)e.disabled=true;e.addEventListener("input",()=>cb(e.value));return e;}
function mkSel(opts,v,cb,dis){const s=document.createElement("select");opts.forEach(o=>{const op=document.createElement("option");op.value=o;op.textContent=o;if(o===v)op.selected=true;s.appendChild(op);});s.addEventListener("change",()=>cb(s.value));if(dis)s.disabled=true;return s;}
function mkTA(v,cb,dis,ph,mh){const t=document.createElement("textarea");t.value=v||"";if(ph)t.placeholder=ph;if(mh)t.style.minHeight=mh;if(dis)t.disabled=true;t.addEventListener("input",()=>cb(t.value));return t;}
function fld(lhtml,inp,hint,vm){const f=document.createElement("div");f.className="field";const l=document.createElement("label");l.innerHTML=lhtml;f.appendChild(l);f.appendChild(inp);if(hint){const h=document.createElement("span");h.className="hint";h.textContent=hint;f.appendChild(h);}if(vm)f.appendChild(vm);return f;}
function vm(txt,cls){const s=document.createElement("span");s.className="vmsg "+cls;s.textContent=txt;return s;}
function al(type,html){const a=document.createElement("div");a.className="alert al-"+type;a.innerHTML=html;return a;}
function rGrp(val,cb,dis){
  const g=document.createElement("div");g.className="rgrp";
  [["pass","✓ ผ่าน","rp"],["fail","✗ ไม่ผ่าน","rf"],["na","— ไม่ใช้","rn"]].forEach(([v,l,cls])=>{
    const s=document.createElement("span");s.className="ropt "+(val===v?cls:"");s.textContent=l;
    if(!dis)s.onclick=()=>{cb(v);render();};g.appendChild(s);
  });return g;
}
function card(title,fn,icon){
  const c=document.createElement("div");c.className="card";
  const ct=document.createElement("div");ct.className="card-title";ct.innerHTML=(icon?icon+" ":"")+title;
  c.appendChild(ct);fn(c);return c;
}

  f.appendChild(card("✅ การอนุมัติ Supervisor",c=>{
    if(!S.locked){
      c.appendChild(al("warn","⚠️ หลังจาก Supervisor กด <strong>อนุมัติและล็อค</strong> เอกสารจะไม่สามารถแก้ไขได้ การเปลี่ยนแปลงทุกครั้งจะถูกบันทึกใน Audit Trail"));
      const svF=document.createElement("div");svF.className="field";svF.style.cssText="max-width:280px;margin:12px 0";svF.innerHTML="<label>ชื่อ Supervisor <span class='req'>*</span></label>";
      const svI=mkI(S.svName,"ชื่อ Supervisor",v=>S.svName=v);svF.appendChild(svI);c.appendChild(svF);
      const lb=document.createElement("button");lb.className="btn btn-s";lb.innerHTML="🔒 อนุมัติและล็อคเอกสาร";
      lb.onclick=()=>{if(!S.svName){alert("กรุณาระบุชื่อ Supervisor");return;}S.locked=true;S.svTime=nowStr();log("✅ Supervisor อนุมัติและล็อคเอกสาร ("+S.svName+")");toast("เอกสารถูกล็อคเรียบร้อย","🔒");render();};
      c.appendChild(lb);
    } else {
      const lb=document.createElement("div");lb.className="lock-notice";lb.innerHTML="🔒 เอกสารถูกล็อคโดย <strong>"+S.svName+"</strong> เมื่อ "+S.svTime;c.appendChild(lb);
    }
  }));
  return f;
}

// Phase 3
function p3(){
  const f=document.createDocumentFragment();
  const rr=rjRate(),yp=yld(),tdm=totalDT(),pm=plannedDT(),upm=tdm-pm;
  const kpis=document.createElement("div");kpis.className="kpi-row";
  [{v:S.produced||"—",l:"ผลิตได้ (DZ)",c:"blue"},{v:rr?rr+"%":"—",l:"Reject Rate",c:parseFloat(rr)>2?"red":parseFloat(rr)>1?"amber":"green"},{v:yp?yp+"%":"—",l:"% Yield",c:parseFloat(yp)>=95?"green":"red"},{v:tdm+" นาที",l:"Downtime รวม",c:tdm>60?"red":tdm>30?"amber":"green"}].forEach(({v,l,c})=>{const k=document.createElement("div");k.className="kpi "+c;k.innerHTML=`<div class='kpi-val'>${v}</div><div class='kpi-lbl'>${l}</div>`;kpis.appendChild(k);});
  f.appendChild(kpis);

  f.appendChild(card("📄 สรุปรายงานประจำกะ",c=>{
    const g=grid("g2");
    const d1=document.createElement("div");d1.appendChild(sep("ข้อมูลการผลิต"));
    [["สายการผลิต",S.line],["วันที่",S.date],["ผลิตภัณฑ์",S.product||"—"],["Operator",S.operator||"—"],["Film Supplier",S.fSup],["Film Lot",S.fLot||"—"],["Batch Bulk",S.bBatch||"—"],["Changeover",(dMin(S.shiftStart,S.coEnd)||"—")+" นาที"]].forEach(([k,v])=>{const r=document.createElement("div");r.className="sum-row";r.innerHTML=`<span>${k}</span><strong>${v}</strong>`;d1.appendChild(r);});g.appendChild(d1);
    const d2=document.createElement("div");d2.appendChild(sep("ผลลัพธ์และปัญหา"));
    [["ผลิตได้ (DZ)",S.produced||"—"],["Reject (EA)",S.reject||"0"],["Reject Rate",rr?rr+"%":"—"],["% Yield",yp?yp+"%":"—"],["Downtime รวม",`${tdm} นาที (Planned: ${pm} / Unplanned: ${upm})`],["ปัญหาหลัก",S.probType||"—"],["ผู้แก้ไข",S.actBy||"—"],["น้ำหนัก AVG",`${avgW()} g (In Spec: ${inSpec()!==null?inSpec()+"%":"—"})`]].forEach(([k,v])=>{const r=document.createElement("div");r.className="sum-row";r.innerHTML=`<span>${k}</span><strong>${v}</strong>`;d2.appendChild(r);});g.appendChild(d2);c.appendChild(g);
    if(S.probDetail){c.appendChild(sep("รายละเอียดปัญหา"));const pd=document.createElement("pre");pd.style.cssText="background:#F8FAFC;border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:12px;white-space:pre-wrap;font-family:'Sarabun',sans-serif;line-height:1.6";pd.textContent=S.probDetail;c.appendChild(pd);}
    if(S.action){c.appendChild(sep("การแก้ไข"));const at=document.createElement("pre");at.style.cssText="background:var(--sl);border:1px solid #A5D6A7;border-radius:var(--r);padding:12px;font-size:12px;white-space:pre-wrap;font-family:'Sarabun',sans-serif;line-height:1.6;color:var(--s)";at.textContent=S.action;c.appendChild(at);}
    c.appendChild(hr());
    const pBtn=document.createElement("button");pBtn.className="btn btn-p btn-sm";pBtn.innerHTML="🖨️ พิมพ์รายงาน";pBtn.onclick=()=>window.print();c.appendChild(pBtn);
  }));

  f.appendChild(card("📝 Audit Trail — ประวัติการบันทึก",c=>{
    const ul=document.createElement("ul");ul.className="audit-list";
    S.audit.forEach(a=>{const li=document.createElement("li");li.className="ai";li.innerHTML=`<span class='at'>🕐 ${a.t}</span><span class='au'>👤 ${a.u}</span><span>${a.a}</span>`;ul.appendChild(li);});c.appendChild(ul);
    if(S.locked){const lb=document.createElement("div");lb.className="lock-notice";lb.style.marginTop="12px";lb.innerHTML="🔒 เอกสารล็อคแล้ว — การเปลี่ยนแปลงต้องผ่าน Supervisor";c.appendChild(lb);}
  }));
  return f;
}

function render(){
  const ct=$id("content");ct.innerHTML="";
  const frag=S.phase===0?p0():S.phase===1?p1():S.phase===2?p2():p3();
  ct.appendChild(frag);
  updateSB();updateFoot();
}
function updateSB(){
  ["nav0","nav1","nav2","nav3"].forEach((id,i)=>{const el=$id(id);el.className="ph-item"+(S.phase===i?" active":i<S.phase?" done":"");});
  ["dot0","dot1","dot2","dot3"].forEach((id,i)=>{const d=$id(id);d.textContent=i<S.phase?"✓":i+1;});
  $id("bdoc").textContent="📄 "+S.doc;$id("bline").textContent="🏭 "+S.line;
  $id("block").style.display=S.locked?"":"none";
  $id("prog").style.width=((S.phase+1)/4*100)+"%";
  const rr=rjRate(),yp=yld(),isp=inSpec(),tdm=totalDT();
  const qrj=$id("qs-rj");qrj.textContent=rr?rr+"%":"—";qrj.className="qs-val "+(rr?(parseFloat(rr)>2?"err":parseFloat(rr)>1?"warn":"ok"):"blue");
  const qyd=$id("qs-yd");qyd.textContent=yp?yp+"%":"—";qyd.className="qs-val "+(yp?(parseFloat(yp)>=95?"ok":"err"):"blue");
  const qdt=$id("qs-dt");qdt.textContent=tdm+" นาที";qdt.className="qs-val "+(tdm>60?"err":tdm>30?"warn":"ok");
  const qsp=$id("qs-sp");qsp.textContent=isp!==null?isp+"%":"—";qsp.className="qs-val "+(isp!==null?(isp>=95?"ok":"err"):"blue");
}
function updateFoot(){
  $id("ft-doc").innerHTML=`<strong style='color:var(--p)'>📄 ${S.doc}</strong>`;
  $id("ft-ph").textContent="ขั้นตอน: "+PH_NAMES[S.phase];
  const rr=rjRate();const fw=$id("ft-warn");
  if(parseFloat(rr)>2){fw.textContent="🚨 Reject สูง: "+rr+"%";fw.style.display="";}else fw.style.display="none";
  $id("btn-bk").style.display=S.phase>0&&!S.locked?"":"none";
  const nx=$id("btn-nx");
  if(S.phase===3){nx.style.display="none";}else{nx.style.display="";nx.textContent=S.phase===2?"ดูสรุปรายงาน →":"บันทึกและถัดไป →";}
}
function go(p){if(S.locked&&p>S.phase)return;S.phase=p;render();window.scrollTo({top:0,behavior:"smooth"});}
function next(){if(S.phase<3){log("บันทึก Phase "+(S.phase+1)+" → Phase "+(S.phase+2));S.phase++;render();window.scrollTo({top:0,behavior:"smooth"});toast("บันทึกข้อมูลเรียบร้อย","✅");}}
function prev(){if(S.phase>0){S.phase--;render();window.scrollTo({top:0,behavior:"smooth"});}}

setInterval(()=>{ $id("clock").textContent=new Date().toLocaleString("th-TH",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});},1000);
$id("clock").textContent=new Date().toLocaleString("th-TH",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});

render();
</script>
</body>
</html>
